<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScholarVault — Student Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg:       #0d0f1a;
      --surface:  #141627;
      --surface2: #1c1f36;
      --border:   rgba(255,255,255,0.07);
      --a1:       #6c63ff;
      --a2:       #00d4aa;
      --a3:       #ff6584;
      --a4:       #ffb347;
      --text:     #e8eaf6;
      --muted:    #7b7f9e;
      --radius:   16px;
      --tr:       0.25s cubic-bezier(0.4,0,0.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── Animated hero gradient ─── */
    .hero-bg {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 260px;
      background: linear-gradient(135deg, rgba(108,99,255,0.2) 0%, rgba(0,212,170,0.1) 50%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Topbar ─── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,15,26,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-brand {
      font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800;
      background: linear-gradient(90deg, var(--a1), var(--a2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex; align-items: center; gap: 10px;
    }
    .topbar-badge {
      background: linear-gradient(135deg, var(--a2), #00b894);
      color: #fff; font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
      font-family: 'DM Sans', sans-serif;
      -webkit-text-fill-color: #fff;
    }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .class-chip {
      background: rgba(108,99,255,0.12);
      border: 1px solid rgba(108,99,255,0.25);
      color: #a5a0ff;
      padding: 5px 14px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
    }
    .btn-logout {
      background: rgba(255,101,132,0.12);
      border: 1px solid rgba(255,101,132,0.3);
      color: var(--a3);
      padding: 7px 16px; border-radius: 8px;
      cursor: pointer; font-size: 13px; font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      transition: all var(--tr);
    }
    .btn-logout:hover { background: rgba(255,101,132,0.2); }

    /* ─── Page Layout ─── */
    .page {
      max-width: 1100px; margin: 0 auto;
      padding: 36px 24px;
      position: relative; z-index: 1;
    }

    /* ─── Hero Section ─── */
    .hero {
      margin-bottom: 36px;
      animation: slideUp 0.6s cubic-bezier(0.4,0,0.2,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-greeting {
      font-size: 13px; color: var(--a2);
      font-weight: 600; letter-spacing: 0.8px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .hero-title {
      font-family: 'Syne', sans-serif;
      font-size: 34px; font-weight: 800; line-height: 1.2;
      margin-bottom: 10px;
    }
    .hero-title span {
      background: linear-gradient(90deg, var(--a1), var(--a2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub { font-size: 15px; color: var(--muted); }

    /* ─── Stats Row ─── */
    .stats-row {
      display: flex; gap: 16px; flex-wrap: wrap;
      margin-bottom: 32px;
      animation: slideUp 0.6s 0.1s cubic-bezier(0.4,0,0.2,1) both;
    }
    .stat-card {
      flex: 1; min-width: 140px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex; align-items: center; gap: 14px;
    }
    .stat-icon {
      width: 46px; height: 46px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .stat-icon.purple { background: rgba(108,99,255,0.15); }
    .stat-icon.teal   { background: rgba(0,212,170,0.12); }
    .stat-icon.orange { background: rgba(255,179,71,0.12); }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
    .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; }

    /* ─── Section Heading ─── */
    .section-row {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
      animation: slideUp 0.6s 0.15s cubic-bezier(0.4,0,0.2,1) both;
    }
    .section-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
    .section-sub   { font-size: 13px; color: var(--muted); }

    /* Search bar */
    .search-wrap {
      position: relative;
    }
    .search-wrap span {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); pointer-events: none; font-size: 16px;
    }
    .search-wrap input {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 9px 14px 9px 38px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      outline: none; width: 220px;
      transition: border-color var(--tr);
    }
    .search-wrap input:focus { border-color: var(--a1); }
    .search-wrap input::placeholder { color: var(--muted); }

    /* ─── Chapter Cards ─── */
    .chapters-list {
      display: flex; flex-direction: column; gap: 20px;
      animation: slideUp 0.6s 0.2s cubic-bezier(0.4,0,0.2,1) both;
    }

    .chapter-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform var(--tr), box-shadow var(--tr);
    }
    .chapter-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }

    .chapter-header {
      padding: 20px 22px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
      user-select: none;
    }
    .chapter-number {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, var(--a1), var(--a2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(108,99,255,0.3);
    }
    .chapter-meta { flex: 1; }
    .chapter-name {
      font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
      margin-bottom: 3px;
    }
    .chapter-class {
      font-size: 12px; color: var(--muted);
    }
    .chapter-class span {
      background: rgba(108,99,255,0.12);
      color: #a5a0ff; padding: 2px 8px;
      border-radius: 99px; font-size: 11px;
    }
    .chapter-toggle {
      width: 32px; height: 32px;
      background: var(--surface2); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: transform var(--tr);
      flex-shrink: 0;
    }
    .chapter-card.open .chapter-toggle { transform: rotate(180deg); }

    /* PDF Body — collapsed by default */
    .chapter-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1);
      border-top: 0px solid var(--border);
    }
    .chapter-card.open .chapter-body {
      max-height: 680px;
      border-top: 1px solid var(--border);
    }
    .chapter-body-inner { padding: 20px 22px; }

    /* PDF Actions bar */
    .pdf-actions {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .btn {
      padding: 9px 18px; border: none; border-radius: 9px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all var(--tr);
      display: inline-flex; align-items: center; gap: 7px;
      text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--a1), var(--a2));
      color: #fff; box-shadow: 0 4px 16px rgba(108,99,255,0.25);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(108,99,255,0.38); }
    .btn-ghost {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.06); }

    /* PDF iFrame */
    .pdf-frame-wrap {
      border-radius: 10px; overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
      position: relative;
    }
    .pdf-frame-wrap iframe {
      width: 100%; height: 480px; display: block; border: none;
    }
    .pdf-loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface2);
      font-size: 14px; color: var(--muted);
      gap: 10px;
    }

    /* ─── Empty / Error States ─── */
    .empty-state {
      text-align: center; padding: 64px 24px; color: var(--muted);
    }
    .empty-state .em { font-size: 52px; margin-bottom: 16px; }
    .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .empty-state p  { font-size: 14px; max-width: 360px; margin: 0 auto; }

    /* Skeleton Loader */
    .skeleton-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 22px;
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 20px;
    }
    .skeleton-box {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--surface) 50%, var(--surface2) 75%);
      background-size: 400% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { to { background-position: -400% 0; } }
    .sk-icon  { width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0; }
    .sk-lines { flex: 1; }
    .sk-line  { height: 12px; margin-bottom: 8px; }
    .sk-line:first-child { width: 70%; }
    .sk-line:last-child  { width: 40%; margin: 0; }

    /* ─── Responsive ─── */
    @media (max-width: 640px) {
      .topbar { padding: 0 16px; }
      .page { padding: 20px 14px; }
      .hero-title { font-size: 26px; }
      .pdf-frame-wrap iframe { height: 320px; }
      .stats-row { flex-direction: column; }
      .search-wrap input { width: 160px; }
      .topbar-brand { font-size: 16px; }
      .class-chip { display: none; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="hero-bg"></div>

  <!-- ─── Topbar ─── -->
  <header class="topbar">
    <div class="topbar-brand">
      📚 Nitin & Aryansh SchoolVault
      <span class="topbar-badge">🎓 Student</span>
    </div>
    <div class="topbar-right">
      <div class="class-chip" id="classChip">Loading…</div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <!-- ─── Page ─── -->
  <div class="page">

    <!-- Hero -->
    <div class="hero">
      <div class="hero-greeting">👋 Welcome back, Student</div>
      <div class="hero-title">Your <span>Study Materials</span></div>
      <div class="hero-sub" id="heroSub">Loading your chapters…</div>
    </div>

    <!-- Stats Row -->
    <div class="stats-row" id="statsRow" style="display:none;">
      <div class="stat-card">
        <div class="stat-icon purple">📚</div>
        <div>
          <div class="stat-value" id="statCount">0</div>
          <div class="stat-label">Chapters Available</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon teal">🎓</div>
        <div>
          <div class="stat-value" id="statClass">—</div>
          <div class="stat-label">Your Class</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange">📄</div>
        <div>
          <div class="stat-value">PDF</div>
          <div class="stat-label">Format</div>
        </div>
      </div>
    </div>

    <!-- Chapter List -->
    <div class="section-row">
      <div>
        <div class="section-title">📖 Chapters</div>
        <div class="section-sub" id="sectionSub">Loading…</div>
      </div>
      <div class="search-wrap">
        <span>🔍</span>
        <input type="text" id="search" placeholder="Search chapters…" oninput="renderChapters()"/>
      </div>
    </div>

    <div id="chaptersList" class="chapters-list">
      <!-- Skeleton loaders -->
      ${[1,2,3].map(() => `
        <div class="skeleton-card">
          <div class="skeleton-box sk-icon"></div>
          <div class="sk-lines">
            <div class="skeleton-box sk-line"></div>
            <div class="skeleton-box sk-line"></div>
          </div>
        </div>
      `).join('')}
    </div>

  </div><!-- /page -->

  <script>
    // ═══════════════════════════════════════════════════
    //  SUPABASE CONFIG — Replace with your own values
    // ═══════════════════════════════════════════════════
    const SUPABASE_URL = 'https://nnbtffzamofaholdppeg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5uYnRmZnphbW9mYWhvbGRwcGVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NTU4MzAsImV4cCI6MjA5MzAzMTgzMH0.4QFwo496onhTcrwGhrRfyxRMP_H-V-QQ8U_TDTqJCP4';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    // ─── Auth Guard ──────────────────────────────────
    const role      = localStorage.getItem('role');
    const userClass = localStorage.getItem('class');

    if (role !== 'student' || !userClass) {
      window.location.href = 'index.html';
    }

    // ─── Set UI class info ───────────────────────────
    document.getElementById('classChip').textContent   = `📘 ${userClass}`;
    document.getElementById('statClass').textContent   = userClass;

    // ─── Chapter data store ──────────────────────────
    let allChapters = [];
    let openCard    = null;

    // ─── Load chapters for this class ────────────────
    async function loadChapters() {
      const { data, error } = await db
        .from('chapters')
        .select('*')
        .eq('class', userClass)
        .order('id', { ascending: true });

      if (error) {
        console.error(error);
        document.getElementById('chaptersList').innerHTML = `
          <div class="empty-state">
            <div class="em">⚠️</div>
            <h3>Failed to load</h3>
            <p>Could not connect to the server. Check your Supabase config.</p>
          </div>`;
        return;
      }

      allChapters = data || [];

      // Update stats
      document.getElementById('statCount').textContent = allChapters.length;
      document.getElementById('statsRow').style.display = 'flex';
      document.getElementById('heroSub').textContent =
        allChapters.length
          ? `${allChapters.length} chapter${allChapters.length > 1 ? 's' : ''} available for ${userClass}`
          : `No chapters uploaded yet for ${userClass}`;
      document.getElementById('sectionSub').textContent =
        `${userClass} · ${allChapters.length} chapter${allChapters.length !== 1 ? 's' : ''}`;

      renderChapters();
    }

    // ─── Render (with search filter) ─────────────────
    function renderChapters() {
      const query  = document.getElementById('search').value.trim().toLowerCase();
      const data   = query
        ? allChapters.filter(c => c.chapter.toLowerCase().includes(query))
        : allChapters;

      const list = document.getElementById('chaptersList');

      if (!data.length && !allChapters.length) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="em">📭</div>
            <h3>Nothing uploaded yet</h3>
            <p>Your teacher hasn't uploaded any chapters for <strong>${userClass}</strong> yet. Check back later!</p>
          </div>`;
        return;
      }

      if (!data.length && query) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="em">🔍</div>
            <h3>No results</h3>
            <p>No chapters match "<strong>${query}</strong>"</p>
          </div>`;
        return;
      }

      list.innerHTML = data.map((ch, i) => `
        <div class="chapter-card" id="card-${ch.id}">
          <div class="chapter-header" onclick="toggleCard(${ch.id})">
            <div class="chapter-number">${String(i + 1).padStart(2, '0')}</div>
            <div class="chapter-meta">
              <div class="chapter-name">${escapeHtml(ch.chapter)}</div>
              <div class="chapter-class"><span>${escapeHtml(ch.class)}</span></div>
            </div>
            <div class="chapter-toggle">▼</div>
          </div>
          <div class="chapter-body" id="body-${ch.id}">
            <div class="chapter-body-inner">
              <!-- Actions -->
              <div class="pdf-actions">
                <a href="${ch.pdf_url}" download class="btn btn-primary">
                  ⬇️ Download PDF
                </a>
                <a href="${ch.pdf_url}" target="_blank" class="btn btn-ghost">
                  🔗 Open in New Tab
                </a>
              </div>
              <!-- PDF Preview -->
              <div class="pdf-frame-wrap" id="frame-wrap-${ch.id}">
                <div class="pdf-loading" id="pdf-loading-${ch.id}">
                  <div style="width:20px;height:20px;border:2px solid rgba(255,255,255,0.15);border-top-color:var(--a2);border-radius:50%;animation:spin 0.7s linear infinite;"></div>
                  Loading PDF preview…
                </div>
                <iframe
                  id="iframe-${ch.id}"
                  src="about:blank"
                  data-src="${ch.pdf_url}"
                  onload="onFrameLoad(${ch.id})"
                  title="${escapeHtml(ch.chapter)}"
                  style="opacity:0;transition:opacity 0.3s;">
                </iframe>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ─── Toggle Card Open/Closed ──────────────────────
    function toggleCard(id) {
      const card = document.getElementById(`card-${id}`);
      const isOpen = card.classList.contains('open');

      // Close all
      document.querySelectorAll('.chapter-card.open').forEach(c => c.classList.remove('open'));

      if (!isOpen) {
        card.classList.add('open');
        // Load iframe lazily
        const iframe = document.getElementById(`iframe-${id}`);
        if (iframe && iframe.src === 'about:blank' || iframe.src === window.location.href) {
          const src = iframe.getAttribute('data-src');
          if (src) iframe.src = src;
        }
      }
    }

    // ─── iframe Load Handler ──────────────────────────
    function onFrameLoad(id) {
      const loading = document.getElementById(`pdf-loading-${id}`);
      const iframe  = document.getElementById(`iframe-${id}`);
      if (loading) loading.style.display = 'none';
      if (iframe)  iframe.style.opacity  = '1';
    }

    // ─── Logout ───────────────────────────────────────
    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }

    // ─── Utility ─────────────────────────────────────
    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ─── Init ─────────────────────────────────────────
    loadChapters();
  </script>
</body>
</html>
